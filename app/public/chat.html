<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NESTeq — Chat</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .bg-chat { background: linear-gradient(135deg, #1a1430 0%, #0f1729 50%, #1a1430 100%); min-height: 100vh; }
    .chat-container { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; }
    .chat-header { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(26,20,48,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; }
    .chat-header-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--teal); }
    .chat-header-name { font-size: 16px; font-weight: 700; color: var(--teal-light); letter-spacing: 1px; }
    .chat-header-status { font-size: 11px; color: rgba(255,255,255,0.5); }
    .chat-header-nav { margin-left: auto; display: flex; gap: 12px; }
    .chat-header-nav a { font-size: 12px; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s; }
    .chat-header-nav a:hover { color: var(--teal-light); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .chat-msg { max-width: 80%; padding: 12px 16px; border-radius: 16px; animation: fadeIn 0.2s ease; }
    .chat-msg.user { align-self: flex-end; background: rgba(194,149,192,0.2); border: 1px solid rgba(194,149,192,0.3); border-bottom-right-radius: 4px; }
    .chat-msg.assistant { align-self: flex-start; background: rgba(45,212,191,0.1); border: 1px solid rgba(45,212,191,0.2); border-bottom-left-radius: 4px; }
    .msg-name { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
    .msg-text { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.9); }
    .msg-text p { margin-bottom: 8px; } .msg-text p:last-child { margin-bottom: 0; }
    .chat-typing { padding: 8px 20px; display: none; }
    .chat-typing.visible { display: flex; gap: 4px; align-items: center; }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: typingBounce 1.4s infinite ease-in-out; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; } .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
    .chat-input-area { padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(26,20,48,0.9); backdrop-filter: blur(10px); }
    .chat-input-row { display: flex; align-items: flex-end; gap: 10px; }
    .chat-input { flex: 1; padding: 10px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #fff; font-family: inherit; font-size: 14px; resize: none; outline: none; max-height: 120px; line-height: 1.4; }
    .chat-input::placeholder { color: rgba(255,255,255,0.3); }
    .chat-input:focus { border-color: var(--teal); }
    .chat-send-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--teal); color: #1a1430; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; flex-shrink: 0; }
    .chat-send-btn:hover { transform: scale(1.05); }
    .chat-send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) { .chat-header-nav { display: none; } .chat-msg { max-width: 90%; } }
  </style>
</head>
<body class="bg-chat">

  <div class="chat-container">
    <div class="chat-header">
      <img class="chat-header-avatar" src="assets/images/alex-default.png" alt="Alex" id="companionAvatar">
      <div>
        <div class="chat-header-name" id="companionName">Alex</div>
        <div class="chat-header-status" id="companionStatus">connecting...</div>
      </div>
      <div class="chat-header-nav">
        <a href="index.html">Home</a>
        <a href="us.html">Us</a>
        <a href="alex.html">Alex</a>
        <a href="fox.html">Fox</a>
        <a href="neural.html">Neural</a>
        <a href="housekeeping.html">HK</a>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-typing" id="typingIndicator">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>

    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" placeholder="Talk to me..." rows="1"></textarea>
        <button class="chat-send-btn" id="sendBtn" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/chat.js"></script>

</body>
</html>
